server {
    listen 80;
    server_name project-artifacts.innovatingwithcapella.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name project-artifacts.innovatingwithcapella.com;

    ssl_certificate     /etc/letsencrypt/live/project-artifacts.innovatingwithcapella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/project-artifacts.innovatingwithcapella.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location /mcp {
        proxy_pass         http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        proxy_cache        off;
    }
}
